<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET UG 2026 — Syllabus Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --physics: #1a6b8a;
    --physics-light: #e6f4f9;
    --physics-mid: #a8d4e4;
    --chemistry: #7a5c00;
    --chemistry-light: #fdf3d0;
    --chemistry-mid: #f0d07a;
    --biology: #2d6a4f;
    --biology-light: #e8f5ef;
    --biology-mid: #95d5b2;
    --bg: #f7f6f2;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e2e0da;
    --radius: 14px;
    --done-color: #aaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── TOP HERO ── */
  .hero {
    background: #0f1923;
    color: #fff;
    padding: 36px 32px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid #e8c840;
  }
  .hero-inner { max-width: 900px; margin: 0 auto; }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 4vw, 32px);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .hero p { font-size: 13px; color: #aaa; margin-bottom: 18px; }

  .overall-progress { display: flex; align-items: center; gap: 14px; }
  .prog-track { flex: 1; height: 7px; background: #2a3545; border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; background: #e8c840; border-radius: 4px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .prog-label { font-size: 13px; color: #e8c840; font-weight: 600; white-space: nowrap; min-width: 60px; text-align: right; }

  /* ── SUBJECT TABS ── */
  .tabs-wrap { max-width: 900px; margin: 28px auto 0; padding: 0 20px; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab {
    padding: 9px 22px;
    border-radius: 40px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { border-color: #aaa; color: var(--text); }
  .tab.active-p { background: var(--physics-light); border-color: var(--physics); color: var(--physics); }
  .tab.active-c { background: var(--chemistry-light); border-color: var(--chemistry); color: var(--chemistry); }
  .tab.active-b { background: var(--biology-light); border-color: var(--biology); color: var(--biology); }

  /* ── STATS ROW ── */
  .stats-row { display: flex; gap: 10px; margin: 18px 0 24px; flex-wrap: wrap; }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-box b { color: var(--text); font-weight: 600; }

  /* ── CONTENT AREA ── */
  .content { max-width: 900px; margin: 0 auto; padding: 0 20px; }
  .subject-panel { display: none; }
  .subject-panel.active { display: block; }

  /* ── UNIT CARD ── */
  .unit-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .unit-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

  .unit-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .unit-header:hover { background: #fafaf8; }
  .unit-header.open { border-bottom-color: var(--border); }

  .unit-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .unit-title { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.4; }
  .unit-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .mini-bar-wrap { width: 50px; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .unit-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .chevron { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); }

  /* ── TOPICS LIST ── */
  .topics-list { padding: 8px 18px 14px; display: none; }
  .topics-list.open { display: block; }

  .topic-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #f0eeea;
    transition: opacity 0.2s;
  }
  .topic-row:last-child { border-bottom: none; }

  .topic-row input[type="checkbox"] {
    margin-top: 2px;
    width: 16px; height: 16px;
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 4px;
  }
  .topic-text {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.55;
    cursor: pointer;
    transition: color 0.2s;
  }
  .topic-text.done {
    text-decoration: line-through;
    color: var(--done-color);
  }

  .select-all-row {
    display: flex;
    justify-content: flex-end;
    padding: 6px 0 2px;
  }
  .select-all-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px dashed var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .select-all-btn:hover { border-color: #aaa; color: var(--text); }

  /* subject accent colors */
  .p .unit-num { background: var(--physics-light); color: var(--physics); }
  .p .mini-bar-fill { background: var(--physics); }
  .p input[type="checkbox"] { accent-color: var(--physics); }

  .c .unit-num { background: var(--chemistry-light); color: var(--chemistry); }
  .c .mini-bar-fill { background: var(--chemistry); }
  .c input[type="checkbox"] { accent-color: var(--chemistry); }

  .b .unit-num { background: var(--biology-light); color: var(--biology); }
  .b .mini-bar-fill { background: var(--biology); }
  .b input[type="checkbox"] { accent-color: var(--biology); }

  /* reset button */
  .reset-btn {
    font-size: 12px; color: #999;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-decoration: underline;
  }
  .reset-btn:hover { color: #e55; }

  @media(max-width:600px) {
    .hero { padding: 24px 16px 20px; }
    .content, .tabs-wrap { padding: 0 12px; }
    .unit-header { padding: 12px 14px; }
    .topics-list { padding: 6px 14px 12px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">

      <button class="reset-btn" onclick="resetAll()">Reset all</button>

  </div>
</div>

<!-- TABS + CONTENT -->

    <button class="tab" onclick="switchTab('biology',this,'active-b')">&#9672; Biology (10 units)</button>

</div>

</div>

const STORAGE_KEY = 'neet2026_tracker_v1';
let state = {};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getKey(subj, ui, ti) { return `${subj}_${ui}_${ti}`; }

function buildPanels() {
  const subjects = ['physics','chemistry','biology'];
  subjects.forEach(subj => {
    const panel = document.getElementById('panel-' + subj);
    const cls = subj === 'physics' ? 'p' : subj === 'chemistry' ? 'c' : 'b';
    panel.innerHTML = '';

    SYLLABUS[subj].forEach((unit, ui) => {
      const card = document.createElement('div');
      card.className = `unit-card ${cls}`;
      card.id = `unit_${subj}_${ui}`;

      const total = unit.topics.length;
      const done = unit.topics.filter((_,ti) => state[getKey(subj,ui,ti)]).length;

      card.innerHTML = `
        <div class="unit-header" onclick="toggleUnit(this)">
          <div class="unit-num">${ui+1}</div>
          <div class="unit-title">${unit.title}</div>
          <div class="unit-right">
            <div class="mini-bar-wrap"><div class="mini-bar-fill" id="mb_${subj}_${ui}" style="width:${total?Math.round(done/total*100):0}%"></div></div>
            <span class="unit-count" id="uc_${subj}_${ui}">${done}/${total}</span>
          </div>
          <span class="chevron">&#9654;</span>
        </div>
        <div class="topics-list" id="tl_${subj}_${ui}">
          <div class="select-all-row">
            <button class="select-all-btn" onclick="toggleAll('${subj}',${ui},event)">Select all</button>
          </div>
          ${unit.topics.map((t,ti) => `
            <div class="topic-row">
              <input type="checkbox" id="cb_${subj}_${ui}_${ti}" ${state[getKey(subj,ui,ti)] ? 'checked' : ''}
                onchange="onCheck('${subj}',${ui},${ti},this.checked)">
              <label class="topic-text ${state[getKey(subj,ui,ti)] ? 'done' : ''}" for="cb_${subj}_${ui}_${ti}">${t}</label>
            </div>`).join('')}
        </div>`;
      panel.appendChild(card);
    });
  });
  updateStats();
}

function toggleUnit(header) {
  const chevron = header.querySelector('.chevron');
  const id = header.parentElement.id;
  const parts = id.split('_');
  const subj = parts[1], ui = parts[2];
  const list = document.getElementById(`tl_${subj}_${ui}`);
  const isOpen = list.classList.toggle('open');
  chevron.classList.toggle('open', isOpen);
  header.classList.toggle('open', isOpen);
}

function onCheck(subj, ui, ti, checked) {
  const key = getKey(subj, ui, ti);
  if (checked) state[key] = true; else delete state[key];
  saveState();
  const label = document.querySelector(`label[for="cb_${subj}_${ui}_${ti}"]`);
  if (label) label.classList.toggle('done', checked);
  updateUnitBar(subj, ui);
  updateStats();
}

function toggleAll(subj, ui, e) {
  e.stopPropagation();
  const unit = SYLLABUS[subj][ui];
  const allDone = unit.topics.every((_,ti) => state[getKey(subj,ui,ti)]);
  unit.topics.forEach((_,ti) => {
    const key = getKey(subj,ui,ti);
    const cb = document.getElementById(`cb_${subj}_${ui}_${ti}`);
    const lbl = document.querySelector(`label[for="cb_${subj}_${ui}_${ti}"]`);
    if (allDone) { delete state[key]; if(cb) cb.checked=false; if(lbl) lbl.classList.remove('done'); }
    else { state[key]=true; if(cb) cb.checked=true; if(lbl) lbl.classList.add('done'); }
  });
  saveState();
  updateUnitBar(subj, ui);
  updateStats();
}

function updateUnitBar(subj, ui) {
  const unit = SYLLABUS[subj][ui];
  const total = unit.topics.length;
  const done = unit.topics.filter((_,ti) => state[getKey(subj,ui,ti)]).length;
  const mb = document.getElementById(`mb_${subj}_${ui}`);
  const uc = document.getElementById(`uc_${subj}_${ui}`);
  if (mb) mb.style.width = (total ? Math.round(done/total*100) : 0) + '%';
  if (uc) uc.textContent = `${done}/${total}`;
}

function updateStats() {
  let grandTotal = 0, grandDone = 0;
  const subjects = ['physics','chemistry','biology'];
  const stats = subjects.map(subj => {
    let t=0, d=0;
    SYLLABUS[subj].forEach((unit,ui) => {
      unit.topics.forEach((_,ti) => { t++; if(state[getKey(subj,ui,ti)]) d++; });
    });
    grandTotal += t; grandDone += d;
    return {subj, t, d, pct: t ? Math.round(d/t*100) : 0};
  });

  // overall bar
  const pct = grandTotal ? Math.round(grandDone/grandTotal*100) : 0;
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `${grandDone} / ${grandTotal}`;

  // subject stats row
  const activePanel = document.querySelector('.subject-panel.active');
  const subjName = activePanel ? activePanel.id.replace('panel-','') : 'physics';
  const info = stats.find(s => s.subj === subjName);
  if (info) {
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-box">Done: <b>${info.d}</b> topics</div>
      <div class="stat-box">Remaining: <b>${info.t - info.d}</b> topics</div>
      <div class="stat-box">Progress: <b>${info.pct}%</b></div>
      <div class="stat-box">Total: <b>${info.t}</b> topics</div>`;
  }
}

function switchTab(subj, btn, cls) {
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  btn.classList.add(cls);
  document.querySelectorAll('.subject-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + subj).classList.add('active');
  updateStats();
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState();
  buildPanels();
}

// Init
state = loadState();
buildPanels();
</script>
